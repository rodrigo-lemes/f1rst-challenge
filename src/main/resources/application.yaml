server:
  port: 8080

spring:
  application:
    name: address-finder

  datasource:
    url: jdbc:h2:mem:address_finder_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

client:
  viacep:
    url: https://viacep.com.br